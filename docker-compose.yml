services:
  postgres:
    image: postgres:16-alpine
    container_name: question-bank-postgres
    environment:
      POSTGRES_DB: question_bank
      POSTGRES_USER: question_bank
      POSTGRES_PASSWORD: question_bank
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U question_bank -d question_bank"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: question-bank-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: questionbank
      MINIO_ROOT_PASSWORD: questionbank123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  minio-data:

